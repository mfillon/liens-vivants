<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mental Map — Graph</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #graph-container { flex: 1; position: relative; }

    svg { width: 100%; height: 100%; }

    .node circle {
      fill: #4a90e2;
      stroke: #fff;
      stroke-width: 1.5px;
      cursor: pointer;
      transition: fill 0.15s;
    }
    .node.selected circle, .node circle:hover { fill: #f5a623; }

    .hub circle { fill: #f5a623; stroke: #fff; stroke-width: 2px; cursor: pointer; }
    .hub.selected circle { fill: #e09010; }

    .node text, .hub text {
      font-size: 12px;
      fill: #e0e0e0;
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .hub text { fill: #fff; font-weight: 600; }

    /* Real keyword connections */
    .link {
      stroke: #4a90e2;
      stroke-opacity: 0.45;
      stroke-width: 2px;
      pointer-events: none;
      transition: stroke-opacity 0.15s, stroke-width 0.15s;
    }
    .link.selected { stroke-opacity: 0.9; stroke-width: 3px; }

    /* Invisible wide hit area for connections */
    .link-hit {
      stroke: transparent;
      stroke-width: 28px;
      cursor: pointer;
      fill: none;
    }

    /* Hub anchor lines */
    .hub-link {
      stroke: #6a7a9a;
      stroke-opacity: 0.4;
      stroke-width: 1.5px;
      stroke-dasharray: 5,4;
      pointer-events: none;
    }
    .hub-link.selected { stroke-opacity: 0.85; stroke: #aab; }

    /* Invisible wide hit area for hub lines */
    .hub-link-hit {
      stroke: transparent;
      stroke-width: 28px;
      cursor: pointer;
      fill: none;
    }

    .link-label {
      font-size: 10px;
      fill: #aaa;
      pointer-events: none;
    }

    #sidebar {
      width: 300px;
      background: #1a1d27;
      border-left: 1px solid #2a2d3a;
      padding: 24px 20px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #sidebar h1 { font-size: 1rem; color: #aaa; margin-bottom: 6px; font-weight: 400; }
    .stats { font-size: 0.8rem; color: #555; margin-bottom: 20px; }
    #sidebar h2 { font-size: 0.85rem; color: #666; margin-bottom: 12px; font-weight: 400; }

    #detail-content .node-block { margin-bottom: 16px; }
    #detail-content .center {
      font-size: 1rem;
      font-weight: 600;
      color: #f5a623;
      margin-bottom: 8px;
    }
    #detail-content ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    #detail-content li {
      padding: 5px 10px;
      background: #2a2d3a;
      border-radius: 4px;
      font-size: 0.875rem;
      color: #ccc;
    }
    .position { font-weight: 600; color: #4a90e2; margin-right: 4px; }

    .shared-tag {
      display: inline-block;
      background: #1e3a5f;
      color: #7eb8f7;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.75rem;
      margin: 0 3px 4px 0;
    }
    .shared-row { margin-bottom: 12px; flex-wrap: wrap; display: flex; }

    .divider {
      border: none;
      border-top: 1px solid #2a2d3a;
      margin: 12px 0;
    }

    .empty { color: #555; font-size: 0.875rem; font-style: italic; }

    #error {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #f56565; font-size: 1.1rem; text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div id="graph-container">
    <svg id="svg"></svg>
    <div id="error"></div>
  </div>
  <div id="sidebar">
    <h1 id="project-title">Loading…</h1>
    <p class="stats" id="stats"></p>
    <h2 id="sidebar-hint">Click a node or connection to explore</h2>
    <div id="detail-content"></div>
  </div>

  <script type="module" src="/src/graph.js"></script>
</body>
</html>
